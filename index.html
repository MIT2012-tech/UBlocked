<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Arcade | Unblocked</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="logo">Cloud<span>Arcade</span></div>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="https://github.com/" target="_blank">GitHub</a></li>
        </ul>
    </nav>

    <header class="hero">
        <h1>Unlimited Gaming</h1>
        <p>Fast, clean, and always available.</p>
        
        <section class="search-bar">
            <input type="text" id="gameSearch" placeholder="Search for a game..." onkeyup="searchGames()">
        </section>
    </header>

    <main>
        <div class="grid-container" id="game-grid">
            <div class="card">
                <div class="card-image" style="background: #ff4757;"></div>
                <div class="card-info">
                    <h3>Slope</h3>
                    <p>Action • High Speed</p>
                    <a href="games/slope/index.html" class="btn">Play</a>
                </div>
            </div>

            <div class="card">
                <div class="card-image" style="background: #2ed573;"></div>
                <div class="card-info">
                    <h3>Retro Bowl</h3>
                    <p>Sports • Strategy</p>
                    <a href="games/retro-bowl/index.html" class="btn">Play</a>
                </div>
            </div>

            <div class="card">
                <div class="card-image" style="background: #ffa502;"></div>
                <div class="card-info">
                    <h3>2048</h3>
                    <p>Puzzle • Math</p>
                    <a href="games/2048/index.html" class="btn">Play</a>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Cloud Arcade - Hosted on Replit</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
